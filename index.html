<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>求人分析ツール</title>
<style>
  body {
    font-family: sans-serif;
    max-width: 800px;
    margin: 40px auto;
    padding: 0 20px;
    line-height: 1.6;

    background-color: #60a7ed; /*少し濃い水色 */
  }

  h1 {
    color: white; /* タイトル白 */
    margin-bottom: 8px;
  }

  p.description {
    color: white; /* 白 */
    margin-bottom: 20px;
  }

  textarea {
    width: 100%;
    height: 220px;
    padding: 12px;
    font-size: 16px;
    box-sizing: border-box;
    resize: vertical;
    border-radius: 6px;
    border: none;
  }

  button {
    margin-top: 12px;
    padding: 10px 18px;
    font-size: 16px;
    cursor: pointer;

    background-color: white; /* 白色ボタン */
    color: black; /* 文字黒 */
    border: none;
    border-radius: 6px;
  }

  button:hover {
    background-color: #008ecc; /* 少し濃く */
  }

  .result-box {
    margin-top: 24px;
    padding: 16px;
    border-radius: 8px;
    background-color: white;
  }

  .result-box h2 {
    margin-top: 0;
  }

  .result-item {
    margin: 8px 0;
  }

  .empty {
    color: #888;
  }
</style>
</head>
<body>
  <h1>求人分析ツール</h1>
  <p class="description">
    求人票の文章を入力すると、キーワードから求人の特徴を簡易判定します。
  </p>

  <textarea id="jobText" placeholder="ここに求人情報を貼り付けてください"></textarea>
  <br>
  <button id="analyzeButton">分析する</button>

  <div class="result-box">
    <h2>分析結果</h2>
    <div id="result" class="empty">ここに結果が表示されます</div>
  </div>

  <script>
    const button = document.querySelector("#analyzeButton");
    const textarea = document.querySelector("#jobText");
    const result = document.querySelector("#result");

    button.addEventListener("click", function () {
      const text = textarea.value;

      if (text.trim() === "") {
        result.innerHTML = "<div class='result-item'>求人情報を入力してください。</div>";
        return;
      }

      const companyTypes = ["SES", "自社", "受託"];
      let foundTypes = [];

      for (let i = 0; i < companyTypes.length; i++) {
        if (text.includes(companyTypes[i])) {
          foundTypes.push(companyTypes[i]);
        }
      }

      let experience = "記載なし";
      if (text.includes("実務経験") || text.includes("開発経験") || text.includes("経験者")) {
        experience = "経験必須の可能性あり";
      } else if (text.includes("未経験") || text.includes("経験不問")) {
        experience = "未経験応募可能の可能性あり";
      }

let techLines = [];
const lines = text.split("\n");

const techKeywords = [
  "使用言語",
  "言語",
  "開発環境",
  "フレームワーク",
  "FW",
  "OS",
  "DB",
  "データベース",
  "クラウド",
];

for (let i = 0; i < lines.length; i++) {
  for (let j = 0; j < techKeywords.length; j++) {
    if (lines[i].includes(techKeywords[j])) {
      techLines.push(lines[i].trim());
      break;
    }
  }
}

   let educationLines = [];
      const educationKeywords = [
        "研修",
        "教育",
        "OJT",
        "メンター",
        "サポート",
        "フォロー",
        "マニュアル"
      ];
  
    for (let i = 0; i < lines.length; i++) {
        for (let j = 0; j < educationKeywords.length; j++) {
          if (lines[i].includes(educationKeywords[j])) {
            educationLines.push(lines[i].trim());
            break;
          }
        }
      }
      
      let output = "";

      if (foundTypes.length > 0) {
        output += "<div class='result-item'><strong>企業・開発形態：</strong>" + foundTypes.join(" / ") + "</div>";
      } else {
        output += "<div class='result-item'><strong>企業・開発形態：</strong>判定できませんでした</div>";
      }

      output += "<div class='result-item'><strong>応募条件：</strong>" + experience + "</div>";

    if (techLines.length > 0) {
  output += "<div class='result-item'><strong>使用技術・開発環境：</strong><br>" + techLines.join("<br>") + "</div>";
} else {
  output += "<div class='result-item'><strong>使用技術・開発環境：</strong>記載が見つかりませんでした</div>";
}

 if (educationLines.length > 0) {
        output += "<div class='result-item'><strong>教育・研修制度：</strong><br>" + educationLines.join("<br>") + "</div>";
      } else {
        output += "<div class='result-item'><strong>教育・研修制度：</strong>記載が見つかりませんでした</div>";
      }
      result.innerHTML = output;
    });
  </script>
</body>
</html>
